<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markpad — Markdown Editor</title>
<style>
  /* ============ Design tokens ============ */
  :root {
    --ink: #21262f;          /* chrome / dark surfaces */
    --ink-2: #2c323d;        /* raised chrome */
    --paper: #faf7f1;        /* editor: warm paper */
    --page: #ffffff;         /* preview: printed page */
    --text: #272b33;         /* primary text */
    --text-soft: #5d636e;
    --muted: #969ba6;        /* captions, gutter */
    --line: #e8e2d6;         /* hairline rules */
    --line-strong: #d8d1c3;
    --code-bg: #f1ece1;
    --code-text: #3a3f49;
    --mark: #e5484d;         /* proofreader's red — used sparingly */
    --mark-soft: #fbe7e7;
    --chrome-text: #e7e9ec;
    --chrome-muted: #9aa1ad;
    --chrome-line: #3a414d;
    --shadow: 0 1px 2px rgba(33,38,47,.06), 0 8px 24px rgba(33,38,47,.06);

    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
  }
  html[data-theme="dark"] {
    --ink: #15181d;
    --ink-2: #1c2128;
    --paper: #1a1d23;
    --page: #16191e;
    --text: #d7dbe2;
    --text-soft: #aab0bb;
    --muted: #6c7380;
    --line: #2a2f38;
    --line-strong: #353b45;
    --code-bg: #22272e;
    --code-text: #c8cdd6;
    --mark: #ff6b6f;
    --mark-soft: #2e1f22;
    --chrome-text: #e7e9ec;
    --chrome-muted: #8b919d;
    --chrome-line: #2a2f38;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--sans);
    color: var(--text);
    background: var(--paper);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }
  :focus-visible { outline: 2px solid var(--mark); outline-offset: 2px; border-radius: 4px; }

  /* ============ Chrome / header ============ */
  header {
    background: var(--ink);
    color: var(--chrome-text);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 14px;
    height: 52px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--chrome-line);
  }
  .brand { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
  .mark {
    width: 22px; height: 22px; flex-shrink: 0;
    display: grid; place-items: center;
    color: var(--mark);
    font-weight: 800; font-size: 19px; line-height: 1;
    font-family: var(--serif);
  }
  .brand b { font-weight: 650; letter-spacing: -.01em; font-size: 15px; }
  .brand b span { color: var(--mark); }

  .filename {
    background: transparent;
    border: 1px solid transparent;
    color: var(--chrome-text);
    font: 500 13px var(--mono);
    padding: 6px 9px;
    border-radius: 6px;
    width: 190px;
    transition: background .15s, border-color .15s;
  }
  .filename:hover { background: var(--ink-2); }
  .filename:focus { background: var(--ink-2); border-color: var(--chrome-line); outline: none; }

  .toolbar { display: flex; align-items: center; gap: 2px; flex-wrap: wrap; flex: 1; }
  .tb-group { display: flex; align-items: center; gap: 1px; }
  .tb-sep { width: 1px; height: 20px; background: var(--chrome-line); margin: 0 6px; flex-shrink: 0; }
  .tbtn {
    background: transparent; border: none; color: var(--chrome-muted);
    width: 30px; height: 30px; border-radius: 6px;
    display: grid; place-items: center;
    transition: background .12s, color .12s;
  }
  .tbtn:hover { background: var(--ink-2); color: var(--chrome-text); }
  .tbtn:active { transform: translateY(1px); }
  .tbtn svg { width: 16px; height: 16px; }
  .tbtn b { font: 700 14px var(--serif); }
  .tbtn i { font: italic 600 15px var(--serif); }

  .actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .seg { display: flex; background: var(--ink-2); border-radius: 7px; padding: 2px; }
  .seg button {
    background: transparent; border: none; color: var(--chrome-muted);
    padding: 5px 9px; border-radius: 5px; font-size: 12px; font-weight: 600;
    display: flex; align-items: center; gap: 5px; transition: .12s;
  }
  .seg button svg { width: 14px; height: 14px; }
  .seg button.on { background: var(--mark); color: #fff; }
  .seg button:not(.on):hover { color: var(--chrome-text); }

  .abtn {
    background: var(--ink-2); border: 1px solid var(--chrome-line);
    color: var(--chrome-text); padding: 7px 12px; border-radius: 7px;
    font-size: 12.5px; font-weight: 600; display: flex; align-items: center; gap: 6px;
    transition: .12s;
  }
  .abtn svg { width: 14px; height: 14px; }
  .abtn:hover { background: var(--chrome-line); }
  .abtn.primary { background: var(--mark); border-color: var(--mark); color: #fff; }
  .abtn.primary:hover { filter: brightness(1.06); }
  .icon-btn {
    background: transparent; border: none; color: var(--chrome-muted);
    width: 32px; height: 32px; border-radius: 7px; display: grid; place-items: center;
    transition: .12s;
  }
  .icon-btn:hover { background: var(--ink-2); color: var(--chrome-text); }
  .icon-btn svg { width: 17px; height: 17px; }

  /* ============ Main split ============ */
  main { flex: 1; display: flex; min-height: 0; position: relative; }
  .pane { min-width: 0; height: 100%; display: flex; flex-direction: column; }
  #editorPane { flex: 1 1 50%; background: var(--paper); }
  #previewPane { flex: 1 1 50%; background: var(--page); border-left: 1px solid var(--line); }

  .pane-label {
    font-size: 10.5px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase;
    color: var(--muted); padding: 9px 22px 0; user-select: none; flex-shrink: 0;
  }

  #editor {
    flex: 1; width: 100%; border: none; resize: none; outline: none;
    background: transparent; color: var(--text);
    font: 14px/1.75 var(--mono);
    padding: 8px 22px 40vh; tab-size: 4;
    caret-color: var(--mark);
  }
  #editor::placeholder { color: var(--muted); }
  #editor::selection { background: var(--mark-soft); }

  /* ============ Resizer seam ============ */
  .seam {
    width: 9px; flex-shrink: 0; cursor: col-resize; background: transparent;
    position: relative; z-index: 5; margin: 0 -4px;
  }
  .seam::after {
    content: ""; position: absolute; inset: 0 4px;
    background: var(--line); transition: background .15s;
  }
  .seam:hover::after, .seam.drag::after { background: var(--mark); }

  /* ============ Preview / rendered markdown ============ */
  #preview {
    flex: 1; overflow-y: auto; padding: 8px 40px 40vh;
    font-family: var(--serif); color: var(--text);
    font-size: 17px; line-height: 1.7;
  }
  #preview > :first-child { margin-top: .3em; }
  .md h1, .md h2, .md h3, .md h4, .md h5, .md h6 {
    font-family: var(--serif); line-height: 1.3; margin: 1.6em 0 .6em; font-weight: 650;
    letter-spacing: -.01em; color: var(--text);
  }
  .md h1 { font-size: 1.9em; border-bottom: 1px solid var(--line); padding-bottom: .3em; }
  .md h2 { font-size: 1.5em; border-bottom: 1px solid var(--line); padding-bottom: .25em; }
  .md h3 { font-size: 1.25em; }
  .md h4 { font-size: 1.05em; }
  .md h5 { font-size: .95em; color: var(--text-soft); }
  .md h6 { font-size: .88em; color: var(--muted); }
  .md p { margin: 0 0 1em; }
  .md a { color: var(--mark); text-decoration: none; border-bottom: 1px solid var(--mark-soft); }
  .md a:hover { border-bottom-color: var(--mark); }
  .md strong { font-weight: 700; }
  .md del { color: var(--muted); }
  .md ul, .md ol { margin: 0 0 1em; padding-left: 1.6em; }
  .md li { margin: .3em 0; }
  .md li::marker { color: var(--muted); }
  .md ul.task-list { list-style: none; padding-left: .3em; }
  .md li.task-item { display: flex; align-items: baseline; gap: .55em; }
  .md li.task-item input { transform: translateY(1px); accent-color: var(--mark); }
  .md blockquote {
    margin: 0 0 1em; padding: .2em 1.1em; color: var(--text-soft);
    border-left: 3px solid var(--mark); background: var(--mark-soft);
    border-radius: 0 6px 6px 0;
  }
  html[data-theme="dark"] .md blockquote { background: transparent; }
  .md code {
    font: .86em var(--mono); background: var(--code-bg); color: var(--code-text);
    padding: .15em .4em; border-radius: 4px;
  }
  .md pre {
    background: var(--code-bg); border: 1px solid var(--line); border-radius: 8px;
    padding: 14px 16px; overflow-x: auto; margin: 0 0 1em; position: relative;
  }
  .md pre code { background: none; padding: 0; font-size: .82em; line-height: 1.6; color: var(--code-text); }
  .md pre[data-lang]::before {
    content: attr(data-lang); position: absolute; top: 0; right: 0;
    font: 600 10px var(--mono); letter-spacing: .06em; text-transform: uppercase;
    color: var(--muted); background: var(--line); padding: 2px 8px; border-radius: 0 7px 0 7px;
  }
  .md table {
    border-collapse: collapse; margin: 0 0 1em; width: 100%; font-size: .92em;
    font-family: var(--sans);
  }
  .md th, .md td { border: 1px solid var(--line-strong); padding: 7px 13px; }
  .md th { background: var(--code-bg); font-weight: 650; }
  .md tr:nth-child(even) td { background: color-mix(in srgb, var(--code-bg) 40%, transparent); }
  .md hr { border: none; border-top: 2px solid var(--line); margin: 1.8em 0; }
  .md img { max-width: 100%; border-radius: 8px; }
  .md kbd {
    font: .82em var(--mono); background: var(--code-bg); border: 1px solid var(--line-strong);
    border-bottom-width: 2px; border-radius: 5px; padding: .1em .45em;
  }

  /* ============ View modes ============ */
  body.mode-write #previewPane,
  body.mode-write .seam { display: none; }
  body.mode-write #editorPane { flex-basis: 100% !important; }
  body.mode-write #editor { max-width: 820px; margin: 0 auto; width: 100%; }
  body.mode-read #editorPane,
  body.mode-read .seam { display: none; }
  body.mode-read #previewPane { flex-basis: 100% !important; border-left: none; }
  body.mode-read #preview { max-width: 760px; margin: 0 auto; }

  /* ============ Status bar ============ */
  footer {
    height: 32px; flex-shrink: 0; background: var(--ink); color: var(--chrome-muted);
    display: flex; align-items: center; gap: 18px; padding: 0 16px;
    font-size: 11.5px; border-top: 1px solid var(--chrome-line);
  }
  footer .stat { display: flex; align-items: center; gap: 5px; }
  footer .stat b { color: var(--chrome-text); font-weight: 650; font-variant-numeric: tabular-nums; }
  footer .spacer { flex: 1; }
  footer .save-state { display: flex; align-items: center; gap: 6px; }
  footer .dot { width: 6px; height: 6px; border-radius: 50%; background: #4caf72; }
  footer .save-state.dirty .dot { background: var(--mark); }

  /* ============ Toast ============ */
  #toast {
    position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%) translateY(12px);
    background: var(--ink-2); color: var(--chrome-text); padding: 10px 16px; border-radius: 9px;
    font-size: 13px; font-weight: 500; box-shadow: var(--shadow); border: 1px solid var(--chrome-line);
    opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 50;
    display: flex; align-items: center; gap: 8px;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast svg { width: 15px; height: 15px; color: var(--mark); }

  /* ============ Shortcuts dialog ============ */
  dialog {
    border: 1px solid var(--line); border-radius: 14px; padding: 0; max-width: 440px; width: 90%;
    box-shadow: var(--shadow); background: var(--page); color: var(--text);
  }
  dialog::backdrop { background: rgba(20,24,30,.45); backdrop-filter: blur(2px); }
  .dlg-head { padding: 18px 22px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
  .dlg-head h2 { margin: 0; font-size: 16px; font-weight: 650; }
  .dlg-head button { background: none; border: none; color: var(--muted); font-size: 22px; line-height: 1; }
  .dlg-body { padding: 14px 22px 22px; }
  .kbd-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; font-size: 13.5px; border-bottom: 1px solid var(--line); }
  .kbd-row:last-child { border-bottom: none; }
  .kbd-row span:first-child { color: var(--text-soft); }
  .kbd-row kbd {
    font: 600 11.5px var(--mono); background: var(--code-bg); border: 1px solid var(--line-strong);
    border-radius: 5px; padding: 2px 7px; margin-left: 3px;
  }

  @media (max-width: 760px) {
    .filename { width: 120px; }
    .pane-label { display: none; }
    body:not(.mode-write):not(.mode-read) main { flex-direction: column; }
    body:not(.mode-write):not(.mode-read) #previewPane { border-left: none; border-top: 1px solid var(--line); }
    .seam { display: none; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body class="mode-split">

<header>
  <div class="brand">
    <span class="mark">¶</span>
    <b>Mark<span>pad</span></b>
  </div>
  <input id="filename" class="filename" value="untitled.md" aria-label="File name" spellcheck="false">

  <div class="toolbar" id="toolbar">
    <div class="tb-group">
      <button class="tbtn" data-cmd="h" title="Heading"><b>H</b></button>
      <button class="tbtn" data-cmd="bold" title="Bold  (Ctrl/Cmd+B)"><b>B</b></button>
      <button class="tbtn" data-cmd="italic" title="Italic  (Ctrl/Cmd+I)"><i>I</i></button>
      <button class="tbtn" data-cmd="strike" title="Strikethrough"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M16 6.5C16 5 14.5 4 12 4S8 5 8 7c0 1.5 1 2.3 3 3M8 17.5C8 19 9.7 20 12 20s4-1.2 4-3"/></svg></button>
    </div>
    <span class="tb-sep"></span>
    <div class="tb-group">
      <button class="tbtn" data-cmd="link" title="Link  (Ctrl/Cmd+K)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1.5 1.5M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1.5-1.5"/></svg></button>
      <button class="tbtn" data-cmd="image" title="Image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="M21 16l-5-5L5 20"/></svg></button>
      <button class="tbtn" data-cmd="quote" title="Quote"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h5v6c0 2.2-1.4 3.6-4 4l-.6-1.6c1.3-.3 2-1 2-2H7V7zm8 0h5v6c0 2.2-1.4 3.6-4 4l-.6-1.6c1.3-.3 2-1 2-2h-2.4V7z"/></svg></button>
      <button class="tbtn" data-cmd="code" title="Inline code"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 8l-5 4 5 4M15 8l5 4-5 4"/></svg></button>
      <button class="tbtn" data-cmd="codeblock" title="Code block"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M8 9l-2 3 2 3M14 9l2 3-2 3"/></svg></button>
    </div>
    <span class="tb-sep"></span>
    <div class="tb-group">
      <button class="tbtn" data-cmd="ul" title="Bulleted list"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h12M8 12h12M8 18h12"/><circle cx="3.5" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.2" fill="currentColor" stroke="none"/></svg></button>
      <button class="tbtn" data-cmd="ol" title="Numbered list"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 6h10M10 12h10M10 18h10M3 6h1.5v4M3 16.5h2v3H3"/></svg></button>
      <button class="tbtn" data-cmd="task" title="Task list"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="7" height="7" rx="1.5"/><path d="M4.5 7.5L6 9l2.5-3M14 6h6M14 17h6M3 14l3 3 3-4"/></svg></button>
      <button class="tbtn" data-cmd="table" title="Table"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="1.5"/><path d="M3 10h18M3 14.5h18M9 5v14M15 5v14"/></svg></button>
      <button class="tbtn" data-cmd="hr" title="Divider"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h16"/></svg></button>
    </div>
  </div>

  <div class="actions">
    <div class="seg" role="group" aria-label="View mode">
      <button data-mode="write" title="Write only"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
      <button data-mode="split" class="on" title="Split view"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M12 4v16"/></svg></button>
      <button data-mode="read" title="Preview only"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="2.5"/></svg></button>
    </div>
    <button class="icon-btn" id="themeBtn" title="Toggle theme"></button>
    <button class="icon-btn" id="helpBtn" title="Keyboard shortcuts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 4.8.8c0 1.7-2.3 2-2.3 3.5"/><circle cx="12" cy="17" r=".6" fill="currentColor"/></svg>
    </button>
    <span class="tb-sep"></span>
    <button class="abtn" id="openBtn" title="Open .md file">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h6l2 2h10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Open</button>
    <button class="abtn primary" id="saveBtn" title="Save .md  (Ctrl/Cmd+S)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3h11l3 3v15H5z"/><path d="M8 3v5h7M8 21v-7h8v7"/></svg>Save</button>
    <button class="icon-btn" id="moreBtn" title="More: export & copy">
      <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="19" cy="12" r="1.7"/></svg>
    </button>
    <input type="file" id="fileInput" accept=".md,.markdown,.txt,text/markdown" hidden>
  </div>
</header>

<main>
  <section class="pane" id="editorPane">
    <div class="pane-label">Source</div>
    <textarea id="editor" spellcheck="true" placeholder="# Start writing…

Markpad speaks GitHub-flavored markdown — **bold**, _italics_, `code`,
tables, task lists, and more. Drag the seam to resize.  Save with ⌘/Ctrl+S."></textarea>
  </section>
  <div class="seam" id="seam" role="separator" aria-label="Resize panes" aria-orientation="vertical"></div>
  <section class="pane" id="previewPane">
    <div class="pane-label">Preview</div>
    <div id="preview" class="md"></div>
  </section>
</main>

<footer>
  <span class="stat"><b id="words">0</b> words</span>
  <span class="stat"><b id="chars">0</b> characters</span>
  <span class="stat"><b id="read">0</b> min read</span>
  <span class="spacer"></span>
  <span class="stat">Ln <b id="ln">1</b>, Col <b id="col">1</b></span>
  <span class="save-state" id="saveState"><span class="dot"></span><span id="saveText">Saved</span></span>
</footer>

<div id="toast"></div>

<dialog id="helpDlg">
  <div class="dlg-head"><h2>Keyboard shortcuts</h2><button id="closeHelp" aria-label="Close">×</button></div>
  <div class="dlg-body">
    <div class="kbd-row"><span>Bold</span><span><kbd>Ctrl/⌘</kbd><kbd>B</kbd></span></div>
    <div class="kbd-row"><span>Italic</span><span><kbd>Ctrl/⌘</kbd><kbd>I</kbd></span></div>
    <div class="kbd-row"><span>Insert link</span><span><kbd>Ctrl/⌘</kbd><kbd>K</kbd></span></div>
    <div class="kbd-row"><span>Inline code</span><span><kbd>Ctrl/⌘</kbd><kbd>E</kbd></span></div>
    <div class="kbd-row"><span>Save .md file</span><span><kbd>Ctrl/⌘</kbd><kbd>S</kbd></span></div>
    <div class="kbd-row"><span>Open .md file</span><span><kbd>Ctrl/⌘</kbd><kbd>O</kbd></span></div>
    <div class="kbd-row"><span>Indent / outdent</span><span><kbd>Tab</kbd> / <kbd>Shift</kbd><kbd>Tab</kbd></span></div>
    <div class="kbd-row"><span>Continue list</span><span><kbd>Enter</kbd></span></div>
  </div>
</dialog>

<script>
/* =================================================================
   Markpad — GitHub-flavored markdown renderer (self-contained)
   ================================================================= */
const MD = (function () {
  function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  const ALLOW=['br','kbd','sub','sup','mark','details','summary','hr','/details','/summary','/kbd','/sub','/sup','/mark'];
  function restoreSafeTags(s){return s.replace(/&lt;(\/?[a-zA-Z]+)&gt;/g,(m,t)=>ALLOW.indexOf(t.toLowerCase())!==-1?'<'+t+'>':m);}
  function slugify(t){return t.toLowerCase().trim().replace(/<[^>]+>/g,'').replace(/[^\w\s-]/g,'').replace(/\s+/g,'-');}

  function parseInline(text){
    const codes=[];
    text=text.replace(/(`+)([\s\S]*?[^`])\1(?!`)/g,(m,tk,code)=>{codes.push('<code>'+escapeHtml(code.replace(/^ | $/g,''))+'</code>');return '\u0000C'+(codes.length-1)+'\u0000';});
    const escs=[];
    text=text.replace(/\\([\\`*_{}\[\]()#+\-.!>~|])/g,(m,ch)=>{escs.push(ch);return '\u0000E'+(escs.length-1)+'\u0000';});
    text=restoreSafeTags(escapeHtml(text));
    text=text.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+&quot;([^&]*)&quot;)?\)/g,(m,alt,src,title)=>'<img src="'+src+'" alt="'+alt+'"'+(title?' title="'+title+'"':'')+'>');
    text=text.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+&quot;([^&]*)&quot;)?\)/g,(m,txt,href,title)=>{const ext=/^https?:/i.test(href)?' target="_blank" rel="noopener"':'';return '<a href="'+href+'"'+(title?' title="'+title+'"':'')+ext+'>'+txt+'</a>';});
    text=text.replace(/&lt;(https?:\/\/[^\s>]+)&gt;/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
    text=text.replace(/&lt;([^\s@]+@[^\s@]+\.[^\s@]+)&gt;/g,'<a href="mailto:$1">$1</a>');
    text=text.replace(/\*\*\*([^*]+)\*\*\*/g,'<strong><em>$1</em></strong>');
    text=text.replace(/\*\*([^*]+?)\*\*/g,'<strong>$1</strong>');
    text=text.replace(/\b__([^_]+?)__\b/g,'<strong>$1</strong>');
    text=text.replace(/(^|[^*])\*([^*\s][^*]*?)\*(?!\*)/g,'$1<em>$2</em>');
    text=text.replace(/\b_([^_]+?)_\b/g,'<em>$1</em>');
    text=text.replace(/~~([^~]+?)~~/g,'<del>$1</del>');
    text=text.replace(/(^|[\s(])((?:https?:\/\/|www\.)[^\s<)]+)/g,(m,pre,url)=>pre+'<a href="'+(/^www\./i.test(url)?'http://'+url:url)+'" target="_blank" rel="noopener">'+url+'</a>');
    text=text.replace(/\u0000E(\d+)\u0000/g,(m,i)=>escapeHtml(escs[+i]));
    text=text.replace(/\u0000C(\d+)\u0000/g,(m,i)=>codes[+i]);
    return text;
  }
  function indentOf(l){let n=0;for(let i=0;i<l.length;i++){if(l[i]===' ')n++;else if(l[i]==='\t')n+=4;else break;}return n;}
  const LIST_RE=/^(\s*)([-*+]|\d+[.)])\s+(.*)$/;
  const isBlank=l=>/^\s*$/.test(l);

  function splitRow(row){row=row.trim().replace(/^\|/,'').replace(/\|$/,'');const cells=[];let cur='';for(let k=0;k<row.length;k++){if(row[k]==='\\'&&row[k+1]==='|'){cur+='|';k++;}else if(row[k]==='|'){cells.push(cur);cur='';}else cur+=row[k];}cells.push(cur);return cells;}

  function renderList(lines){
    const first=lines.find(l=>LIST_RE.test(l));const fm=first.match(LIST_RE);
    const ordered=/\d/.test(fm[2]);const baseIndent=fm[1].length;
    const items=[];let cur=null;
    for(const l of lines){const m=l.match(LIST_RE);
      if(m&&m[1].length<=baseIndent+1){if(cur)items.push(cur);cur={content:[m[3]]};}
      else{if(!cur)continue;cur.content.push(l.replace(new RegExp('^\\s{0,'+(baseIndent+2)+'}'),''));}}
    if(cur)items.push(cur);
    const tag=ordered?'ol':'ul';let startAttr='';
    if(ordered){const sn=fm[2].match(/\d+/)[0];if(sn!=='1')startAttr=' start="'+sn+'"';}
    const hasTask=items.some(it=>/^\[[ xX]\]\s/.test(it.content[0]));
    let html='<'+tag+startAttr+(hasTask?' class="task-list"':'')+'>';
    items.forEach(it=>{let body=it.content.join('\n');const task=body.match(/^\[([ xX])\]\s+([\s\S]*)$/);let cb='';
      if(task){cb='<input type="checkbox" disabled'+(task[1].toLowerCase()==='x'?' checked':'')+'> ';body=task[2];}
      let r=parseBlocks(body);const single=r.match(/^<p>([\s\S]*)<\/p>$/);
      if(single&&single[1].indexOf('<p>')===-1)r=single[1];
      html+='<li'+(task?' class="task-item"':'')+'>'+cb+r+'</li>';});
    return html+'</'+tag+'>';
  }

  function parseBlocks(src){
    const lines=src.replace(/\r\n?/g,'\n').split('\n');const out=[];let i=0;const N=lines.length;
    while(i<N){let line=lines[i];
      if(isBlank(line)){i++;continue;}
      const fence=line.match(/^(\s*)(`{3,}|~{3,})\s*([\w+-]*)\s*$/);
      if(fence){const marker=fence[2][0],minLen=fence[2].length,lang=fence[3],buf=[];i++;
        while(i<N&&!(new RegExp('^\\s*'+(marker==='`'?'`':'~')+'{'+minLen+',}\\s*$')).test(lines[i])){buf.push(lines[i]);i++;}i++;
        out.push('<pre'+(lang?' data-lang="'+lang+'"':'')+'><code'+(lang?' class="language-'+lang+'"':'')+'>'+escapeHtml(buf.join('\n'))+'</code></pre>');continue;}
      const h=line.match(/^(#{1,6})\s+(.*?)\s*#*\s*$/);
      if(h){const lv=h[1].length;out.push('<h'+lv+' id="'+slugify(h[2])+'">'+parseInline(h[2])+'</h'+lv+'>');i++;continue;}
      if(/^\s*([-*_])\s*(\1\s*){2,}$/.test(line)){out.push('<hr>');i++;continue;}
      if(/^\s*>/.test(line)){const q=[];while(i<N&&/^\s*>/.test(lines[i])){q.push(lines[i].replace(/^\s*>\s?/,''));i++;}out.push('<blockquote>'+parseBlocks(q.join('\n'))+'</blockquote>');continue;}
      if(line.indexOf('|')!==-1&&i+1<N&&/^\s*\|?\s*:?-{1,}:?\s*(\|\s*:?-{1,}:?\s*)+\|?\s*$/.test(lines[i+1])){
        const headerCells=splitRow(line);
        const aligns=splitRow(lines[i+1]).map(c=>{const t=c.trim(),l=t.startsWith(':'),r=t.endsWith(':');return l&&r?'center':r?'right':l?'left':'';});
        i+=2;const rows=[];while(i<N&&lines[i].indexOf('|')!==-1&&!isBlank(lines[i])){rows.push(splitRow(lines[i]));i++;}
        const thead='<thead><tr>'+headerCells.map((c,idx)=>'<th'+(aligns[idx]?' style="text-align:'+aligns[idx]+'"':'')+'>'+parseInline(c.trim())+'</th>').join('')+'</tr></thead>';
        const tbody='<tbody>'+rows.map(r=>'<tr>'+headerCells.map((_,idx)=>'<td'+(aligns[idx]?' style="text-align:'+aligns[idx]+'"':'')+'>'+parseInline((r[idx]||'').trim())+'</td>').join('')+'</tr>').join('')+'</tbody>';
        out.push('<table>'+thead+tbody+'</table>');continue;}
      if(LIST_RE.test(line)){const listLines=[];const baseIndent=indentOf(line);
        while(i<N){if(isBlank(lines[i])){let j=i+1;while(j<N&&isBlank(lines[j]))j++;if(j<N&&(LIST_RE.test(lines[j])||indentOf(lines[j])>baseIndent)){listLines.push('');i++;continue;}break;}
          if(LIST_RE.test(lines[i])||indentOf(lines[i])>baseIndent){listLines.push(lines[i]);i++;}else break;}
        out.push(renderList(listLines));continue;}
      const pbuf=[];
      while(i<N&&!isBlank(lines[i])&&!/^(\s*)(`{3,}|~{3,})/.test(lines[i])&&!/^#{1,6}\s/.test(lines[i])&&!/^\s*>/.test(lines[i])&&!LIST_RE.test(lines[i])&&!/^\s*([-*_])\s*(\1\s*){2,}$/.test(lines[i])){pbuf.push(lines[i]);i++;}
      out.push('<p>'+parseInline(pbuf.join('\n')).replace(/(  |\\)\n/g,'<br>\n')+'</p>');
    }
    return out.join('\n');
  }
  return { render: s=>s?parseBlocks(s):'', slugify };
})();

/* =================================================================
   App logic
   ================================================================= */
const $ = id => document.getElementById(id);
const editor = $('editor'), preview = $('preview');
const SAMPLE = `# Welcome to Markpad

A fast, no-frills **markdown editor** that speaks _GitHub-flavored markdown_.
Everything renders live in the page beside you — and it all runs **locally**,
so your writing never leaves your machine.

## What it handles

- **Emphasis**: *italic*, **bold**, ~~strikethrough~~, and \`inline code\`
- Nested lists, with as many levels as you like
  - second level
    - third level
- Autolinks like https://github.com and [named links](https://example.com)

### Task lists

- [x] Render GitHub-flavored markdown
- [x] Save \`.md\` files to disk
- [ ] Write something brilliant

### Tables

| Feature        | Supported | Notes              |
|:---------------|:---------:|-------------------:|
| Tables         |    yes    | with alignment     |
| Code fences    |    yes    | with language tags |
| Blockquotes    |    yes    | even nested        |

### Code

\`\`\`javascript
function greet(name) {
  return \`Hello, \${name}!\`;
}
\`\`\`

> Tip: drag the seam between the panes to resize them, or switch to
> **write-only** / **preview-only** from the top-right.

---

Happy writing. Save your work with **⌘/Ctrl + S**.
`;

const DRAFT_KEY = 'markpad:draft', NAME_KEY = 'markpad:name', THEME_KEY = 'markpad:theme';
let dirty = false, saveTimer = null;

/* ---- safe localStorage wrapper (works locally, degrades silently) ---- */
const store = {
  get(k){ try { return localStorage.getItem(k); } catch(e){ return null; } },
  set(k,v){ try { localStorage.setItem(k,v); } catch(e){} },
};

/* ---- render (debounced) ---- */
let renderTimer = null;
function render(){
  preview.innerHTML = MD.render(editor.value);
  updateStats();
}
function scheduleRender(){
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, 90);
  markDirty();
}

function updateStats(){
  const text = editor.value;
  const words = (text.trim().match(/\S+/g) || []).length;
  $('words').textContent = words.toLocaleString();
  $('chars').textContent = text.length.toLocaleString();
  $('read').textContent = Math.max(1, Math.round(words / 220));
  updateCursor();
}
function updateCursor(){
  const upto = editor.value.slice(0, editor.selectionStart);
  const lines = upto.split('\n');
  $('ln').textContent = lines.length;
  $('col').textContent = lines[lines.length - 1].length + 1;
}

function markDirty(){
  dirty = true;
  $('saveState').classList.add('dirty');
  $('saveText').textContent = 'Unsaved';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    store.set(DRAFT_KEY, editor.value);
    store.set(NAME_KEY, $('filename').value);
    dirty = false;
    $('saveState').classList.remove('dirty');
    $('saveText').textContent = 'Draft saved';
  }, 800);
}

/* ---- toolbar commands ---- */
function surround(before, after, placeholder){
  const s = editor.selectionStart, e = editor.selectionEnd;
  const sel = editor.value.slice(s, e) || placeholder;
  const text = before + sel + after;
  editor.setRangeText(text, s, e, 'select');
  if (!editor.value.slice(s, e + text.length - (e - s))) {}
  editor.selectionStart = s + before.length;
  editor.selectionEnd = s + before.length + sel.length;
  editor.focus();
  scheduleRender();
}
function linePrefix(prefix){
  const s = editor.selectionStart, e = editor.selectionEnd;
  const val = editor.value;
  const lineStart = val.lastIndexOf('\n', s - 1) + 1;
  let lineEnd = val.indexOf('\n', e); if (lineEnd === -1) lineEnd = val.length;
  const block = val.slice(lineStart, lineEnd);
  const lines = block.split('\n');
  const ordered = prefix === '1. ';
  const out = lines.map((l, idx) => {
    if (!l.trim()) return l;
    const p = ordered ? (idx + 1) + '. ' : prefix;
    return l.startsWith(p) ? l.slice(p.length) : p + l;
  }).join('\n');
  editor.setRangeText(out, lineStart, lineEnd, 'select');
  editor.focus();
  scheduleRender();
}
function insertBlock(text){
  const s = editor.selectionStart;
  const val = editor.value;
  const atLineStart = s === 0 || val[s - 1] === '\n';
  const pre = atLineStart ? '' : '\n';
  editor.setRangeText(pre + text, s, editor.selectionEnd, 'end');
  editor.focus();
  scheduleRender();
}
const COMMANDS = {
  bold:   () => surround('**', '**', 'bold text'),
  italic: () => surround('_', '_', 'italic text'),
  strike: () => surround('~~', '~~', 'strikethrough'),
  code:   () => surround('`', '`', 'code'),
  link:   () => surround('[', '](https://)', 'link text'),
  image:  () => surround('![', '](https://)', 'alt text'),
  h:      () => linePrefix('## '),
  quote:  () => linePrefix('> '),
  ul:     () => linePrefix('- '),
  ol:     () => linePrefix('1. '),
  task:   () => linePrefix('- [ ] '),
  codeblock: () => insertBlock('```\n\n```\n'),
  hr:     () => insertBlock('\n---\n'),
  table:  () => insertBlock('| Column A | Column B |\n|----------|----------|\n| Cell 1   | Cell 2   |\n'),
};
$('toolbar').addEventListener('click', e => {
  const btn = e.target.closest('[data-cmd]');
  if (btn && COMMANDS[btn.dataset.cmd]) COMMANDS[btn.dataset.cmd]();
});

/* ---- Tab indent / list continuation ---- */
editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, en = editor.selectionEnd;
    if (e.shiftKey) {
      const ls = editor.value.lastIndexOf('\n', s - 1) + 1;
      if (editor.value.slice(ls, ls + 2) === '  ') {
        editor.setRangeText('', ls, ls + 2, 'end');
        editor.selectionStart = editor.selectionEnd = Math.max(ls, s - 2);
      }
    } else {
      editor.setRangeText('  ', s, en, 'end');
    }
    scheduleRender();
    return;
  }
  if (e.key === 'Enter') {
    const s = editor.selectionStart;
    const val = editor.value;
    const ls = val.lastIndexOf('\n', s - 1) + 1;
    const line = val.slice(ls, s);
    const m = line.match(/^(\s*)([-*+]|\d+[.)])\s+(\[[ xX]\]\s+)?/);
    if (m) {
      if (!line.slice(m[0].length).trim()) {            // empty item → end list
        e.preventDefault();
        editor.setRangeText('', ls, s, 'end');
        scheduleRender();
        return;
      }
      e.preventDefault();
      let marker = m[2];
      if (/\d/.test(marker)) marker = (parseInt(marker) + 1) + marker.replace(/\d+/, '').charAt(0 ) ;
      const task = m[3] ? '[ ] ' : '';
      const next = '\n' + m[1] + marker + ' ' + task;
      editor.setRangeText(next, s, s, 'end');
      scheduleRender();
    }
  }
});
editor.addEventListener('input', scheduleRender);
editor.addEventListener('keyup', updateCursor);
editor.addEventListener('click', updateCursor);

/* ---- global shortcuts ---- */
document.addEventListener('keydown', e => {
  const mod = e.metaKey || e.ctrlKey;
  if (!mod) return;
  const k = e.key.toLowerCase();
  const map = { b: 'bold', i: 'italic', k: 'link', e: 'code' };
  if (map[k]) { e.preventDefault(); COMMANDS[map[k]](); }
  else if (k === 's') { e.preventDefault(); saveFile(); }
  else if (k === 'o') { e.preventDefault(); $('fileInput').click(); }
});

/* ---- save / open ---- */
function safeName(){
  let n = ($('filename').value || 'untitled').trim();
  if (!/\.(md|markdown|txt)$/i.test(n)) n += '.md';
  return n;
}
function saveFile(){
  const blob = new Blob([editor.value], { type: 'text/markdown;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = safeName();
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  store.set(DRAFT_KEY, editor.value);
  $('saveState').classList.remove('dirty');
  $('saveText').textContent = 'Saved';
  toast('Saved ' + safeName());
}
$('saveBtn').addEventListener('click', saveFile);
$('openBtn').addEventListener('click', () => $('fileInput').click());
$('fileInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    editor.value = reader.result;
    $('filename').value = file.name;
    render(); markDirty();
    toast('Opened ' + file.name);
    editor.focus();
  };
  reader.readAsText(file);
  e.target.value = '';
});

/* ---- more menu: export html / copy ---- */
$('moreBtn').addEventListener('click', async () => {
  const choice = await miniMenu($('moreBtn'), [
    { label: 'Copy markdown', val: 'copy-md' },
    { label: 'Copy rendered HTML', val: 'copy-html' },
    { label: 'Export as .html', val: 'export-html' },
    { label: 'Clear document', val: 'clear' },
  ]);
  if (choice === 'copy-md') { copy(editor.value); toast('Markdown copied'); }
  else if (choice === 'copy-html') { copy(preview.innerHTML); toast('HTML copied'); }
  else if (choice === 'export-html') exportHtml();
  else if (choice === 'clear') { if (confirm('Clear the document? This cannot be undone.')) { editor.value=''; render(); markDirty(); } }
});
function copy(text){
  navigator.clipboard?.writeText(text).catch(() => {
    const t = document.createElement('textarea'); t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); t.remove();
  });
}
function exportHtml(){
  const doc = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${safeName().replace(/\.\w+$/,'')}</title>
<style>body{font-family:Georgia,serif;max-width:740px;margin:40px auto;padding:0 20px;line-height:1.7;color:#272b33}
code{background:#f1ece1;padding:.15em .4em;border-radius:4px;font-family:ui-monospace,monospace}
pre{background:#f1ece1;padding:14px 16px;border-radius:8px;overflow-x:auto}pre code{background:none}
blockquote{border-left:3px solid #e5484d;margin:0;padding:.2em 1.1em;color:#5d636e}
table{border-collapse:collapse;width:100%}th,td{border:1px solid #d8d1c3;padding:7px 13px}th{background:#f1ece1}
a{color:#e5484d}img{max-width:100%}</style></head>
<body>${preview.innerHTML}</body></html>`;
  const blob = new Blob([doc], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = safeName().replace(/\.\w+$/, '') + '.html';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  toast('Exported HTML');
}

/* ---- tiny contextual menu ---- */
function miniMenu(anchor, items){
  return new Promise(resolve => {
    const menu = document.createElement('div');
    Object.assign(menu.style, {
      position:'fixed', background:'var(--ink-2)', border:'1px solid var(--chrome-line)',
      borderRadius:'9px', padding:'5px', boxShadow:'var(--shadow)', zIndex:60, minWidth:'180px',
    });
    items.forEach(it => {
      const b = document.createElement('button');
      b.textContent = it.label;
      Object.assign(b.style, { display:'block', width:'100%', textAlign:'left', background:'none',
        border:'none', color:'var(--chrome-text)', padding:'8px 11px', borderRadius:'6px',
        fontSize:'13px', cursor:'pointer' });
      b.onmouseenter = () => b.style.background = 'var(--chrome-line)';
      b.onmouseleave = () => b.style.background = 'none';
      b.onclick = () => { cleanup(); resolve(it.val); };
      menu.appendChild(b);
    });
    document.body.appendChild(menu);
    const r = anchor.getBoundingClientRect();
    menu.style.top = (r.bottom + 6) + 'px';
    menu.style.right = (window.innerWidth - r.right) + 'px';
    function cleanup(){ menu.remove(); document.removeEventListener('mousedown', outside); }
    function outside(e){ if (!menu.contains(e.target)) { cleanup(); resolve(null); } }
    setTimeout(() => document.addEventListener('mousedown', outside), 0);
  });
}

/* ---- view modes ---- */
document.querySelector('.seg').addEventListener('click', e => {
  const btn = e.target.closest('[data-mode]'); if (!btn) return;
  document.querySelectorAll('.seg button').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.body.className = 'mode-' + btn.dataset.mode;
});

/* ---- theme ---- */
const sun = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>';
const moon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.5 6.5 0 0 0 9.8 9.8z"/></svg>';
function setTheme(t){
  document.documentElement.dataset.theme = t;
  $('themeBtn').innerHTML = t === 'dark' ? sun : moon;
  store.set(THEME_KEY, t);
}
$('themeBtn').addEventListener('click', () => setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'));

/* ---- resizable seam ---- */
(function(){
  const seam = $('seam'), ep = $('editorPane'), pp = $('previewPane');
  let dragging = false;
  seam.addEventListener('pointerdown', e => { dragging = true; seam.classList.add('drag'); seam.setPointerCapture(e.pointerId); });
  seam.addEventListener('pointermove', e => {
    if (!dragging) return;
    const main = document.querySelector('main').getBoundingClientRect();
    let ratio = (e.clientX - main.left) / main.width;
    ratio = Math.min(0.8, Math.max(0.2, ratio));
    ep.style.flex = ratio + ' 1 0'; pp.style.flex = (1 - ratio) + ' 1 0';
  });
  seam.addEventListener('pointerup', () => { dragging = false; seam.classList.remove('drag'); });
})();

/* ---- synced scroll (editor → preview) ---- */
let syncing = false;
editor.addEventListener('scroll', () => {
  if (syncing) { syncing = false; return; }
  const ratio = editor.scrollTop / (editor.scrollHeight - editor.clientHeight || 1);
  syncing = true;
  preview.scrollTop = ratio * (preview.scrollHeight - preview.clientHeight);
});

/* ---- toast ---- */
let toastTimer;
function toast(msg){
  const t = $('toast');
  t.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20 6L9 17l-5-5"/></svg>' + msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1900);
}

/* ---- help dialog ---- */
$('helpBtn').addEventListener('click', () => $('helpDlg').showModal());
$('closeHelp').addEventListener('click', () => $('helpDlg').close());
$('helpDlg').addEventListener('click', e => { if (e.target === $('helpDlg')) $('helpDlg').close(); });

/* ---- warn before leaving with unsaved-to-disk content ---- */
window.addEventListener('beforeunload', e => {
  if (editor.value.trim() && dirty) { e.preventDefault(); e.returnValue = ''; }
});

/* ---- init ---- */
(function init(){
  const prefersDark = (typeof window.matchMedia === 'function') && window.matchMedia('(prefers-color-scheme: dark)').matches;
  setTheme(store.get(THEME_KEY) || (prefersDark ? 'dark' : 'light'));
  const draft = store.get(DRAFT_KEY);
  editor.value = (draft && draft.length) ? draft : SAMPLE;
  if (store.get(NAME_KEY)) $('filename').value = store.get(NAME_KEY);
  render();
  $('saveText').textContent = draft ? 'Draft restored' : 'Saved';
  editor.focus();
  editor.setSelectionRange(0, 0);
})();
</script>
</body>
</html>
